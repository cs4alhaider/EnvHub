<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 1024px; background: transparent; }
  .canvas {
    width: 1024px; height: 1024px;
    display: flex; align-items: center; justify-content: center;
  }
  /* macOS-style rounded square with ~9% padding around it */
  .tile {
    width: 840px; height: 840px;
    border-radius: 188px;               /* superellipse-ish */
    background: linear-gradient(155deg, #4A8CFF 0%, #2F6BF0 42%, #3A4ED8 100%);
    position: relative;
    box-shadow:
      0 40px 90px rgba(20, 40, 120, 0.45),
      inset 0 3px 0 rgba(255,255,255,0.35),
      inset 0 -10px 30px rgba(10, 25, 90, 0.35);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* soft top-left sheen */
  .tile::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(120% 90% at 22% 12%, rgba(255,255,255,0.35), rgba(255,255,255,0) 55%);
  }
  /* faint dotted "environment grid" texture */
  .tile::after {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.10) 2.5px, transparent 2.6px);
    background-size: 54px 54px;
    background-position: 12px 12px;
    mask-image: linear-gradient(160deg, black, transparent 70%);
    -webkit-mask-image: linear-gradient(160deg, black, transparent 70%);
  }
  .doc { position: relative; z-index: 2; filter: drop-shadow(0 16px 30px rgba(10,25,90,0.45)); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="tile">
      <!-- document with a folded corner, masked-value lines, and ".env" -->
      <svg class="doc" width="480" height="588" viewBox="0 0 100 122.5" fill="none">
        <defs>
          <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#E9EEFC"/>
          </linearGradient>
          <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#D6DFF8"/>
            <stop offset="1" stop-color="#B6C5F0"/>
          </linearGradient>
          <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2F6BF0"/>
            <stop offset="1" stop-color="#3A4ED8"/>
          </linearGradient>
          <filter id="foldshadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="-1.2" dy="1.6" stdDeviation="1.6" flood-color="#1A2C6E" flood-opacity="0.30"/>
          </filter>
        </defs>
        <!-- page: rounded corners except the folded top-right -->
        <path fill="url(#paper)" d="
          M 10 0
          H 66
          L 100 34
          V 112.5
          Q 100 122.5 90 122.5
          H 10
          Q 0 122.5 0 112.5
          V 10
          Q 0 0 10 0
          Z"/>
        <!-- the fold flap -->
        <path fill="url(#fold)" filter="url(#foldshadow)" d="M 66 0 L 100 34 H 76 Q 66 34 66 24 Z"/>
        <!-- masked env lines: KEY=••• abstraction -->
        <g>
          <rect x="14" y="24" width="18" height="7" rx="3.5" fill="#C4D2F5"/>
          <rect x="36" y="24" width="22" height="7" rx="3.5" fill="#E0E7FB"/>
          <rect x="14" y="38" width="24" height="7" rx="3.5" fill="#C4D2F5"/>
          <rect x="42" y="38" width="30" height="7" rx="3.5" fill="#E0E7FB"/>
          <rect x="14" y="52" width="15" height="7" rx="3.5" fill="#C4D2F5"/>
          <rect x="33" y="52" width="26" height="7" rx="3.5" fill="#E0E7FB"/>
        </g>
        <!-- the extension, front and center -->
        <text x="50" y="96" text-anchor="middle"
              font-family="Menlo, monospace"
              font-weight="700" font-size="30" letter-spacing="-1.2"
              fill="url(#brand)">.env</text>
      </svg>
    </div>
  </div>
</body>
</html>
