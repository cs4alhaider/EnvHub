<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 340px; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif; }
  .banner {
    width: 1200px; height: 340px; position: relative; overflow: hidden;
    background:
      radial-gradient(900px 500px at 78% -10%, rgba(74,140,255,0.28), rgba(74,140,255,0) 60%),
      radial-gradient(700px 500px at 12% 120%, rgba(90,80,230,0.22), rgba(90,80,230,0) 55%),
      linear-gradient(160deg, #0e1320 0%, #0b0f1a 55%, #0a0d16 100%);
    display: flex; align-items: center; gap: 48px; padding: 0 72px;
  }
  /* dotted environment texture */
  .banner::after {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 2px, transparent 2.2px);
    background-size: 40px 40px; background-position: 8px 8px;
    mask-image: linear-gradient(120deg, transparent, black 60%);
    -webkit-mask-image: linear-gradient(120deg, transparent, black 60%);
  }
  /* the real app icon — its bitmap includes the squircle margins and shadow */
  .appicon { width: 205px; flex: 0 0 205px; position: relative; z-index: 2; margin: 0 -12px; }
  .appicon img { width: 100%; display: block; }
  .content { position: relative; z-index: 2; }
  .name { font-size: 84px; font-weight: 800; letter-spacing: -2px; color: #fff; line-height: 1; }
  .name .accent { color: #6FA8FF; }
  .tag { margin-top: 14px; font-size: 27px; font-weight: 400; color: #aab4c5; letter-spacing: -0.3px; }
  .chips { margin-top: 22px; display: flex; gap: 10px; }
  .chip {
    font-size: 15px; font-weight: 600; color: #c6d2e6; padding: 7px 15px; border-radius: 999px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  }
  .chip.blue { color: #8fb8ff; background: rgba(74,140,255,0.12); border-color: rgba(74,140,255,0.28); }
</style>
</head>
<body>
  <div class="banner">
    <div class="appicon">
      <img src="../../EnvHub/EnvHub/Assets.xcassets/AppIcon.appiconset/icon_512.png" alt="EnvHub icon">
    </div>
    <div class="content">
      <div class="name">Env<span class="accent">Hub</span></div>
      <div class="tag">Every <code style="font-family:'SF Mono',monospace;color:#cdd8ea;font-size:24px">.env</code> file on your machine, in one window.</div>
      <div class="chips">
        <span class="chip blue">Native macOS</span>
        <span class="chip">SwiftUI</span>
        <span class="chip">Open source</span>
        <span class="chip">No telemetry</span>
        <span class="chip">CLI included</span>
      </div>
    </div>
  </div>
</body>
</html>
